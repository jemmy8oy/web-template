server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    location = /your-app-name {
        return 301 /your-app-name/;
    }

    location /your-app-name/ {
        try_files $uri /your-app-name/index.html;
    }

    # Optional: cache static files aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires max;
        log_not_found off;
    }
}
