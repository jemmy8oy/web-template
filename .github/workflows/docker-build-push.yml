name: Build and Push Docker Images to OCIR

# Triggered manually only. To also deploy on every merge to main, add:
#   push:
#     branches:
#       - main
# to the `on:` block below.
#
# This template targets OCI Container Registry with ARM64 images (for OKE free tier).
#
# Required GitHub repository variables (Settings → Secrets and variables → Variables):
#   OCIR_REGISTRY    e.g. lhr.ocir.io
#   OCIR_NAMESPACE   e.g. your-tenancy-namespace
#
# Required GitHub repository secrets (Settings → Secrets and variables → Secrets):
#   OCIR_USERNAME    e.g. your-tenancy/oracleidentitycloudservice/your@email.com
#   OCIR_AUTH_TOKEN  OCI auth token (not your account password)
#
# Image names are controlled by the FRONTEND_IMAGE and BACKEND_IMAGE env vars below.
# They must match the image paths configured in helm/values.yaml.
#
# ARM64 runner note:
#   This workflow uses ubuntu-24.04-arm — a native ARM64 GitHub-hosted runner.
#   This avoids QEMU emulation overhead and is available on PUBLIC repositories for free.
#   For PRIVATE repositories, ubuntu-24.04-arm requires a paid plan.
#   If you are on a private repo, replace the runner with:
#     runs-on: ubuntu-latest
#   and add a QEMU setup step before Docker Buildx:
#     - name: Set up QEMU
#       uses: docker/setup-qemu-action@v3
#       with:
#         platforms: arm64
#   then add `platforms: linux/arm64` to both build-push steps.

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FRONTEND_IMAGE: your-app-name-frontend   # Replace with your image name
  BACKEND_IMAGE: your-app-name-backend     # Replace with your image name

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm  # Native ARM64 runner — no QEMU emulation overhead

    steps:
      # --- 1. GENERATE SHORT-LIVED GITOPS BOT TOKEN ---
      - name: Generate GitOps Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GIT_OPS_APP_ID }} # Pulled from global Org variables
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }} # Pulled from global Org secrets

      # --- 2. CHECKOUT CODE USING THE APP TOKEN ---
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for GitVersion to read full git history
          token: ${{ steps.app-token.outputs.token }} # 🔑 Overrides the restricted default token

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v1
        with:
          versionSpec: "5.x"

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Oracle Container Image Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.OCIR_REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      # --- 3. BUILD & PUSH BACKEND ---
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ vars.OCIR_REGISTRY }}/${{ vars.OCIR_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ vars.OCIR_REGISTRY }}/${{ vars.OCIR_NAMESPACE }}/${{ env.BACKEND_IMAGE }}:${{ steps.gitversion.outputs.semVer }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # --- 4. BUILD & PUSH FRONTEND ---
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ vars.OCIR_REGISTRY }}/${{ vars.OCIR_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ vars.OCIR_REGISTRY }}/${{ vars.OCIR_NAMESPACE }}/${{ env.FRONTEND_IMAGE }}:${{ steps.gitversion.outputs.semVer }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # --- 5. THE GITOPS AUTO-UPDATE LOOP ---
      - name: Install yq (YAML Processor)
        uses: mikefarah/yq@v4.44.1

      - name: Update Helm Chart Values File
        run: |
          NEW_VERSION="${{ steps.gitversion.outputs.semVer }}"
          VALUES_FILE="helm/values.yaml"
          
          echo "Patching array image tags in $VALUES_FILE to version: $NEW_VERSION"
          
          yq -i '(.apps[] | select(.name == "backend") | .image.tag) = "'"$NEW_VERSION"'"' $VALUES_FILE
          yq -i '(.apps[] | select(.name == "frontend") | .image.tag) = "'"$NEW_VERSION"'"' $VALUES_FILE

      - name: Commit and Push Image Tag Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add helm/values.yaml
          
          if git diff --staged --quiet; then
            echo "No manifest changes required. Version is already up to date."
          else
            git commit -m "chore(gitops): release version ${{ steps.gitversion.outputs.semVer }} [skip ci]"
            
            # This cleanly pushes back using the App token set during checkout
            git push origin HEAD
          fi
